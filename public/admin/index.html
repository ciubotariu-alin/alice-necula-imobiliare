<!doctype html>
<html lang="ro" translate="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <!-- Împiedică traducerea automată a browserului, care strică panoul (eroarea removeChild). -->
    <meta name="google" content="notranslate" />
    <title>Administrare · Alice Necula</title>
  </head>
  <body class="notranslate">
    <!-- Sveltia CMS: înlocuitor pentru Decap, imun la eroarea removeChild (Safari/Mac). -->
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "github",
            repo: "ciubotariu-alin/alice-necula-imobiliare",
            branch: "main",
            base_url: window.location.origin,
            auth_endpoint: "api/auth",
          },
          media_folder: "public/images",
          public_folder: "/images",
          site_url: window.location.origin,
          collections: [
            {
              name: "proprietati",
              label: "Proprietăți",
              files: [
                {
                  name: "lista",
                  label: "Listă proprietăți",
                  file: "content/properties.json",
                  fields: [
                    {
                      name: "items",
                      label: "Proprietăți",
                      label_singular: "Proprietate",
                      widget: "list",
                      summary: "{{fields.title}}",
                      fields: [
                        { name: "title", label: "Titlu", widget: "string" },
                        { name: "image", label: "Fotografie", widget: "image", required: false },
                        { name: "price", label: "Preț", widget: "string", hint: "ex: 120.000 € sau 465 €/mp" },
                        { name: "location", label: "Locație", widget: "string", hint: "ex: București, Pipera" },
                        { name: "neighborhood", label: "Cartier (identificator)", widget: "string", hint: "litere mici, fără spații — ex: pipera" },
                        { name: "rooms", label: "Camere", widget: "number", default: 0, value_type: "int", min: 0 },
                        { name: "baths", label: "Băi", widget: "number", default: 0, value_type: "int", min: 0 },
                        { name: "surface", label: "Suprafață (mp)", widget: "number", default: 0, value_type: "int", min: 0 },
                        {
                          name: "status",
                          label: "Status",
                          widget: "select",
                          default: "de-vanzare",
                          options: [
                            { label: "De vânzare", value: "de-vanzare" },
                            { label: "Rezervat", value: "rezervat" },
                            { label: "Vândut", value: "vandut" },
                          ],
                        },
                        { name: "exclusive", label: "Reprezentare exclusivă", widget: "boolean", default: true },
                        { name: "zeroCommission", label: "0% comision", widget: "boolean", default: false },
                        { name: "id", label: "Identificator unic", widget: "string", hint: "litere mici fără spații — ex: pipera-3-camere" },
                      ],
                    },
                  ],
                },
              ],
            },
            {
              name: "video",
              label: "Video",
              files: [
                {
                  name: "lista",
                  label: "Secțiune video",
                  file: "content/videos.json",
                  fields: [
                    {
                      name: "items",
                      label: "Clipuri",
                      label_singular: "Clip",
                      widget: "list",
                      summary: "{{fields.label}}",
                      fields: [
                        { name: "label", label: "Titlu", widget: "string" },
                        { name: "url", label: "Link YouTube / Vimeo", widget: "string", required: false, hint: "Lipește adresa clipului. Lasă gol pentru o casetă goală." },
                      ],
                    },
                  ],
                },
              ],
            },
            {
              name: "imagini",
              label: "Poze principale",
              files: [
                {
                  name: "principale",
                  label: "Poze site",
                  file: "content/media.json",
                  fields: [
                    { name: "hero", label: "Poza mare de sus (hero)", widget: "image" },
                    { name: "aliceHome", label: "Poză „Despre mine\" (prima pagină)", widget: "image" },
                    { name: "aliceAbout", label: "Poză pagina Despre", widget: "image" },
                    { name: "featureExperienta", label: "Caseta „Experiența de vânzare / Cum lucrăm împreună”", widget: "image", required: false },
                    { name: "featureProprietati", label: "Caseta „Proprietăți / Listate exclusiv”", widget: "image", required: false },
                    { name: "featureBlog", label: "Caseta „Blog / Amărănt & cuișoare”", widget: "image", required: false },
                  ],
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
